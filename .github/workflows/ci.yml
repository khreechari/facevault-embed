name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # Third-party actions are SHA-pinned (tags can be repointed, SHAs can't);
      # the comment records the human-readable version for reviewable bumps.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'

      - name: Syntax-check embed.js + Express example
        run: |
          node --check embed.js
          node --check examples/express/server.js

      - name: Validate JSON
        run: node -e "require('./examples/express/package.json')"

      - name: Syntax-check FastAPI example
        run: python3 -m py_compile examples/fastapi/app.py
