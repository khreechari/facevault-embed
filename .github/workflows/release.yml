name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # All third-party actions are SHA-pinned per supply-chain best practice;
      # the comment records the human-readable version next to each SHA.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'

      - name: Syntax-check before release
        run: |
          node --check embed.js
          node --check examples/express/server.js
          python3 -m py_compile examples/fastapi/app.py

      - name: SHA256 checksums
        run: |
          sha256sum embed.js > SHA256SUMS.txt
          cat SHA256SUMS.txt

      # Publish the [vX.Y.Z] CHANGELOG section as the release body so the
      # public release page mirrors the in-repo changelog.
      - name: Extract changelog for this tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          awk -v tag="$TAG" '
            $0 ~ "^## \\[" tag "\\]" { capture=1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > release-body.md
          echo "Body length: $(wc -c < release-body.md)"
          if [ ! -s release-body.md ]; then
            echo "WARNING: no CHANGELOG section found for $TAG" >&2
          fi

      - name: Publish release assets
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2.6.2
        with:
          files: |
            embed.js
            SHA256SUMS.txt
          fail_on_unmatched_files: true
          body_path: release-body.md
